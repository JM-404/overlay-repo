<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="char" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>
  <!-- Maskable icon: keep the safe area inside the centre 80% so any platform
       crop (circle/squircle/square) won't clip the character. -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central"
        font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="240" font-weight="700" fill="url(#char)">灵</text>
</svg>
